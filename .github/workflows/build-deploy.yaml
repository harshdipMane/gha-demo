name: build-deploy demo
on: 
 pull_request:
  types: 
   - opened
   - synchronize
jobs:
   build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
       - name: build step
         run: echo "building the application"
   deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
       - name: Deploy step
         run: echo "Deploying the application"
